services:
  service-notification:
    build:
      context: .
    container_name: service-notification
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_PATH: /data/service-notification.sqlite
      TZ: ${TZ:-Asia/Hong_Kong}
    volumes:
      - service-notification-data:/data
    restart: on-failure:2
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  service-notification-data:
